<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아기사자 명단 대시보드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard">
        <section class="summary-section">
            <div class="summary-grid">
                <article class="card-summary me">
                    <div class="image-wrapper">
                        <img src="/media/girl1.png" alt="박효연 프로필">
                        <span class="badge">Me</span> 
                    </div>
                    <div class="card-content">
                        <h3 class="name">박효연</h3>
                        <p class="part">Frontend</p>

                    </div>
                </article>

                <article class="card-summary">
                    <div class="image-wrapper">
                        <img src="/media/girl2.png" alt="심민서 프로필">

                    </div>
                    <div class="card-content">
                        <h3 class="name">심민서</h3>
                        <p class="part">Frontend</p>
                        <p class="one-liner">내 친구 민서</p>
                    </div>
                </article>

                <article class="card-summary">
                    <div class="image-wrapper">
                        <img src="/media/girl3.png" alt="정주영 프로필">

                        <p class="part">Student</p>

                    </div>
                </article>

                <article class="card-summary">
                    <div class="image-wrapper">
                        <img src="/media/girl4.png" alt="조예은 프로필">
                        <span class="badge">Friend</span>
                    </div>
                    <div class="card-content">
                        <h3 class="name">조예은</h3>
                        <p class="part">Student</p>
                        <p class="one-liner">내 친구 예은이</p>
                    </div>
                </article>

                <article class="card-summary">
                    <div class="image-wrapper">
                        <img src="/media/boy1.png" alt="김연지 프로필">
                        <span class="badge">Friend</span>
                    </div>
                    <div class="card-content">
                        <h3 class="name">김연지</h3>
                        <p class="part">Design</p>
                        <p class="one-liner">우리팀 연지</p>
                    </div>
                </article>

                <article class="card-summary">
                    <div class="image-wrapper">
                        <img src="/media/boy2.png" alt="이제혁 프로필">
                        <span class="badge">Senior</span>
                    </div>
                    <div class="card-content">
                        <h3 class="name">이제혁</h3>
                        <p class="part">Backend</p>
                        <p class="one-liner">실감 실험실 실장 실실실</p>
                    </div>
                </article>

                <article class="card-summary">
                    <div class="image-wrapper">
                        <img src="/media/boy3.png" alt="홍길동 프로필">
                        <span class="badge">Friend</span>
                    </div>
                    <div class="card-content">
                        <h3 class="name">홍길동</h3>
                        <p class="part">anymore</p>
                        <p class="one-liner">이제 친구가 없당</p>
                    </div>
                </article>

                <article class="card-summary">
                    <div class="image-wrapper">
                        <img src="/media/boy4.png" alt="홍길동 프로필">
                        <span class="badge">Friend</span>
                    </div>
                    <div class="card-content">
                        <h3 class="name">홍길동</h3>

                    </div>
                </article>

                <article class="card-summary">
                    <div class="image-wrapper">
                        <img src="/media/boy4.png" alt="홍길동 프로필">
                        <span class="badge">Friend</span>
                    </div>
                    <div class="card-content">
                        <h3 class="name">홍길동</h3>
                        <p class="part">anymore</p>
                        <p class="one-liner">이제 친구가 없당</p>
                    </div>
                </article>
            </div>
        </section>

</html>
