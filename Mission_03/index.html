<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아기사자 명단 대시보드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard">
        <section class="control-section">
            <div class="control-buttons">
                <button id="add-btn">아기 사자 추가</button>
                <button id="delete-btn">마지막 아기 사자 삭제</button>
            </div>
            <p class="count-text">총 <span id="total-count">0</span>명</p>
        </section>

        <section id="form-section" class="form-section hidden">
            <form id="add-form">
                <div class="form-group">
                    <input type="text" id="form-name" placeholder="이름">
                    <select id="form-part">
                        <option value="">파트 선택</option>
                        <option value="Frontend">Frontend</option>
                        <option value="Backend">Backend</option>
                        <option value="Design">Design</option>
                    </select>
                </div>
                <input type="text" id="form-skills" placeholder="관심 기술 (쉼표로 구분)">
                <input type="text" id="form-one-liner" placeholder="한 줄 소개">
                <textarea id="form-intro" placeholder="자기소개"></textarea>
                <div class="form-group">
                    <input type="email" id="form-email" placeholder="이메일">
                    <input type="tel" id="form-phone" placeholder="전화번호">
                </div>
                <input type="text" id="form-website" placeholder="웹사이트">
                <input type="text" id="form-motto" placeholder="한 마디">
                
                <div class="form-btns">
                    <button type="submit" id="submit-btn">추가하기</button>
                    <button type="button" id="cancel-btn">취소</button>
                </div>
            </form>
        </section>

        <section class="summary-section">
            <div id="summary-grid" class="summary-grid">
                <article class="card-summary me">
                    <div class="image-wrapper">
                        <img src="/media/girl1.png" alt="박효연">
                        <span class="badge">HTML/CSS</span>
                    </div>
                    <div class="card-content">
                        <h3 class="name">박효연</h3>
                        <p class="part">Frontend</p>
                        <p class="one-liner">이건 나</p>
                    </div>
                </article>
            </div>
        </section>

        <section class="detail-section">
            <div id="detail-list" class="detail-list"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
